<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>upload</title>
    <script src="client.js"></script>
    <script src="server.js"></script>
</head>
<body>
    <label for="avatar">Kies een bestand:</label>
    <input type="file" id="avatar" name="avatar" accept="image/png, image/jpeg" />
    <button id="ready-btn" disabled>Klaar</button>
    <div id="file-info" style="margin-top: 10px;"></div>

    <script>
      const fileInput = document.getElementById('avatar');
      const readyBtn = document.getElementById('ready-btn');
      const fileInfo = document.getElementById('file-info');

      fileInput.addEventListener('change', () => {
        const file = fileInput.files[0];
        if (!file) {
          readyBtn.disabled = true;
          fileInfo.textContent = '';
          return;
        }
        readyBtn.disabled = false;
        fileInfo.textContent = 'Geselecteerd: ' + file.name;
      });

      readyBtn.addEventListener('click', () => {
        fileInfo.textContent = 'Bestand klaar: ' + fileInput.files[0].name;
      });
    </script>
