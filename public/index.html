<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEXUS SHARE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="index.css">
</head>
<body>
<div id="loading-overlay" class="loading-overlay">
<div class="loading-content"><div class="spinner"></div><h2>Secure Connection</h2><p>Connecting to I2P...</p>
<p class="loading-status" id="loading-status-text">Starting...</p></div>
</div>
<div class="app-container">
<header class="app-header">
<div class="brand"><span class="logo-symbol">//</span><h1>NEXUS SHARE</h1></div>
<div class="header-actions">
<button class="btn btn-secondary btn-sm" id="btn-theme-toggle">DARK</button>
<button class="btn btn-danger btn-sm" id="btn-logout" style="display:none">LOGOUT</button>
<div class="system-status"><div class="status-indicator" id="status-dot"></div><span class="status-text" id="status-label">OFFLINE</span></div>
</div>
</header>
<main class="app-grid">
<div class="grid-col layout-left">
<div class="card" id="auth-card">
<div class="tabs">
<button class="tab-btn active" id="tab-login-trigger">LOGIN</button>
<button class="tab-btn" id="tab-register-trigger">REGISTER</button>
</div>
<div class="tab-content">
<form id="login-form" class="auth-form">
<div class="form-group"><label for="login-username">USERNAME</label>
<input type="text" id="login-username" required placeholder="Username...">
</div>
<div class="form-group"><label for="login-password">PASSWORD</label>
<input type="password" id="login-password" required placeholder="Password...">
</div>
<button type="submit" class="btn btn-primary w-100" id="btn-login-submit">LOGIN</button>
</form>
<form id="register-form" class="auth-form" style="display:none">
<div class="form-group"><label for="register-username">USERNAME</label>
<input type="text" id="register-username" required placeholder="Username...">
</div>
<div class="form-group"><label for="register-password">PASSWORD</label>
<input type="password" id="register-password" required placeholder="Password...">
</div>
<button type="submit" class="btn btn-primary w-100" id="btn-register-submit">REGISTER</button>
</form>
</div>
</div>
<div class="card" id="transfer-card" style="display:none">
<div class="card-header"><h2>SEND FILE</h2></div>
<div class="card-body">
<form id="transfer-form">
<div class="form-group"><label for="transfer-recipient">RECIPIENT</label>
<input type="text" id="transfer-recipient" required placeholder="Username...">
</div>
<div class="form-group"><label>FILE</label>
<div class="dropzone" id="file-dropzone">
<span class="dropzone-text">DRAG OR CLICK</span>
<input type="file" id="transfer-file-input" class="hidden-file-input">
</div>
<div id="selected-file-details" class="file-details" style="display:none">
<span class="file-name" id="selected-file-name">none</span>
<span class="file-size" id="selected-file-size">0B</span>
<button type="button" class="btn-remove-file" id="btn-clear-file">&times;</button>
</div>
</div>
<button type="submit" class="btn btn-primary w-100" id="btn-send-submit" disabled>SEND</button>
</form>
</div>
</div>
<div class="card" id="transfers-card" style="display:none">
<div class="card-header"><h2>TRANSFERS</h2></div>
<div class="card-body" id="transfers-list"></div>
</div>
</div>
<div class="grid-col layout-right">
<div class="card console-card">
<div class="card-header console-header">
<h2>CONSOLE</h2>
<button class="btn btn-secondary btn-xs" id="btn-clear-logs">CLEAR</button>
</div>
<div class="console-body" id="console-output">
<div class="log-line system-line">[SYSTEM] Ready.</div>
</div>
</div>
<div class="card cabinet-card">
<div class="card-header"><h2>RECEIVED</h2>
<button class="btn btn-secondary btn-xs" id="btn-refresh-files">REFRESH</button>
</div>
<div class="cabinet-body">
<div class="table-wrapper">
<table class="cabinet-table">
<thead><tr><th>FILE</th><th>SIZE</th><th>ACTION</th></tr></thead>
<tbody id="files-table-body">
<tr><td colspan="3" class="text-center empty-cabinet">No files.</td></tr>
</tbody>
</table>
</div>

</div>
</div>
</div>
</main>
</div>
<script src="app.js"></script>
</body>
</html>

  </div>

  <script src="app.js"></script>
</body>

</html>
