<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Login</h2>

<form action="server.php?action=login" method="POST">

    <input
        type="text"
        name="username"
        placeholder="Gebruikersnaam"
        required>

    <input
        type="password"
        name="password"
        placeholder="Wachtwoord"
        required>

    <button type="submit">
        Login

</form>

</body>
</html>
